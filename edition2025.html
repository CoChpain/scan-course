<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>EDITION 2025</title>

<style>
body{
  background:#000;
  color:white;
  font-family:Arial, sans-serif;
  text-align:center;
  margin:0;
  padding:20px;
}

/* Titre */
h1{
  margin-top:10px;
  font-size:40px;
  letter-spacing:3px;
  text-shadow:0 0 10px #00ffcc;
}

/* Image principale */
.main-image{
  width:80%;
  max-width:700px;
  border-radius:10px;
  box-shadow:0 0 20px rgba(0,255,200,0.3);
  margin-top:20px;
}

/* Deux images côte à côte */
.small-images{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:25px;
  flex-wrap:wrap;
}

.small-images img{
  width:260px;
  border-radius:10px;
  box-shadow:0 0 15px rgba(255,255,255,0.15);
}

/* Bouton style néon */
.btn{
  display:inline-block;
  margin-top:35px;
  padding:12px 25px;
  background:#00ffaa;
  color:#000;
  font-weight:bold;
  text-decoration:none;
  border-radius:6px;
  font-size:18px;
  box-shadow:0 0 10px #00ffaa;
  transition:0.2s;
}

.btn:hover{
  background:#00ffcc;
  box-shadow:0 0 15px #00ffcc;
}

/* Tableau */
table{
  width:90%;
  margin:40px auto;
  border-collapse:collapse;
  font-size:14px;
  border:2px solid #555;
}

th,td{
  border:1px solid #333;
  padding:8px;
}

th{
  background:#111;
}

tr:nth-child(even){
  background:rgba(255,255,255,0.05);
}

/* Responsive */
@media (max-width:768px){
  .small-images img{
    width:90%;
  }
}

</style>

</head>

<body>

<h1>EDITION 2025</h1>

<!-- Image principale -->
<img src="IMG_6745.jpg" alt="Image principale" class="main-image">

<!-- Deux petites images -->
<div class="small-images">
    <img src="IMG_6603.jpg" alt="Petite image 1">
    <img src="IMG_6735.jpg" alt="Petite image 2">
</div>

<!-- Bouton Google Photos -->
<a href="https://photos.google.com/share/AF1QipNiKV_LluaYgFabAKPty2uk0ircW6NpG8iVWJsiPgxa0i02wafR2QxMa5yuIXzoag?key=am03X0swVEpHQjZCRDhzN2hyOGlMdzR6U1FEU2pB" 
   class="btn" target="_blank">
   Voir l’album
</a>

<!-- Tableau -->
<table>
    <tr>
        <th>Colonne 1</th>
        <th>Colonne 2</th>
        <th>Colonne 3</th>
    </tr>
    <tr>
        <td>...</td>
        <td>...</td>
        <td>...</td>
    </tr>
</table>

</body>
</html>
