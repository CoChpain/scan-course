<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Liste des Participants</title>

<style>
body {
  background: #000;
  color: #fff;
  font-family: Arial, sans-serif;
  text-align: center;
  margin: 0;
  padding: 0;
}

h1 {
  margin-top: 40px;
  font-size: 42px;
  letter-spacing: 2px;
  color: #00eaff;
  text-shadow: 0 0 10px #00eaff;
}

/* Colonnes adaptatives */
.columns {
  display: grid;
  gap: 10px;
  width: 98%;
  margin: 30px auto;
  justify-content: center;
}

.cols-1 { grid-template-columns: repeat(1, 1fr); }
.cols-2 { grid-template-columns: repeat(2, 1fr); }
.cols-3 { grid-template-columns: repeat(3, 1fr); }
.cols-4 { grid-template-columns: repeat(4, 1fr); }

/* 📱 Mobile : forcer 2 colonnes max */
@media (max-width: 768px) {
  .cols-4 { grid-template-columns: repeat(2, 1fr); }
  .cols-3 { grid-template-columns: repeat(2, 1fr); }
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
  line-height: 16px;
  border: 2px solid #555; /* Bordure renforcée */
}

th, td {
  border: 1px solid #333;
  padding: 4px 6px;
}

th {
  background: #111;
  font-size: 15px;
}

/* 🌈 Alternance douce */
tr:nth-child(even) {
  background: rgba(255,255,255,0.05);
}

.femme {
  color: #ff66cc;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>🏃 LISTE DES PARTICIPANTS</h1>

<div id="contenu"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { 
  getFirestore, collection, query, orderBy, onSnapshot 
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
import { firebaseConfig } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const div = document.getElementById("contenu");

onSnapshot(query(collection(db, "coureurs"), orderBy("dossard", "asc")), snap => {
  
  let participants = [];
  snap.forEach(doc => {
    const c = doc.data();
    participants.push(c);
  });

  afficherParticipants(participants);
});

function afficherParticipants(participants) {

  const nb = participants.length;
  let cols = 4;
  if (nb < 20) cols = 1;
  else if (nb < 50) cols = 2;
  else if (nb < 90) cols = 3;

  let html = `<div class="columns cols-${cols}">`;

  const chunkSize = Math.ceil(nb / cols);
  const colonnes = [];
  for (let i = 0; i < cols; i++) {
    colonnes.push(participants.slice(i * chunkSize, (i + 1) * chunkSize));
  }

  colonnes.forEach(col => {
    html += `<table><tr><th>Dossard</th><th>Nom</th><th>Prénom</th><th>Cat.</th></tr>`;

    col.forEach(p => {
      const classe = p.categorie === "F" ? "femme" : "";
      html += `
        <tr class="${classe}">
          <td>${p.dossard}</td>
          <td>${p.nom}</td>
          <td>${p.prenom}</td>
          <td>${p.categorie}</td>
        </tr>
      `;
    });

    html += `</table>`;
  });

  html += `</div>`;
  div.innerHTML = html;
}
</script>

</body>
</html>
