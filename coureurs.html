<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Coureurs</title>
</head>
<body style="background:#000;color:white;font-family:Arial;text-align:center;">
  <h1>🏃 Base coureurs</h1>
  <a href="index.html" style="color:gray;">⬅ Retour</a>

  <h2>Liste des coureurs</h2>

  <table border="1" style="margin:auto;color:white;">
    <thead>
      <tr>
        <th>Dossard</th>
        <th>Nom</th>
        <th>Prénom</th>
        <th>Statut</th>
        <th>Catégorie</th>
      </tr>
    </thead>
    <tbody id="liste-coureurs"></tbody>
  </table>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, collection, getDocs } 
      from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    import { firebaseConfig } from "./firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const tbody = document.getElementById("liste-coureurs");

    async function chargerCoureurs(){
      tbody.innerHTML = "";
      const snap = await getDocs(collection(db, "coureurs"));
      snap.forEach(doc => {
        const c = doc.data();

        const rouge = (c.statut === "DNF" || c.statut === "ELIMINE");
        const rose = (!rouge && c.categorie === "F");
        const style = rouge
          ? "style='color:red;font-weight:bold;'"
          : rose
            ? "style='color:#ff66cc;font-weight:bold;'"
            : "style='color:white;'";

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td ${style}>${c.dossard}</td>
          <td ${style}>${c.nom}</td>
          <td ${style}>${c.prenom}</td>
          <td ${style}>${c.statut}</td>
          <td ${style}>${c.categorie}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    chargerCoureurs();
  </script>
</body>
</html>
