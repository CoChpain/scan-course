<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>SCAN COURSE</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body style="background:#000;color:white;font-family:Arial;text-align:center;">

  <!-- 🔒 VERROUILLAGE PAR MOT DE PASSE -->
  <div id="lock" style="position:fixed;top:0;left:0;width:100%;height:100%;background:black;color:white;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999;">
    <h2>🔒 Accès protégé</h2>
    <input id="pwd" type="password" placeholder="Mot de passe" style="padding:10px;font-size:20px;">
    <button onclick="checkPwd()" style="padding:10px 20px;margin-top:10px;font-size:20px;">Entrer</button>
    <div id="err" style="color:red;margin-top:10px;"></div>
  </div>

  <script>
  function checkPwd(){
    const good = "3sRunTravel2026";
    const val = document.getElementById("pwd").value;
    if(val === good){
      document.getElementById("lock").style.display = "none";
    } else {
      document.getElementById("err").innerHTML = "Mot de passe incorrect";
    }
  }
  </script>

  <h1>🏁 SCAN</h1>
  <a href="index.html" style="color:gray;">⬅ Retour</a>

  <div id="reader" style="width:320px;margin:20px auto;"></div>
  <div id="feedback" style="font-size:26px;font-weight:bold;margin-top:20px;"></div>

  <!-- DNF MANUEL -->
  <div style="margin-top:20px;">
    <input id="dossard-manuel" type="text" placeholder="Dossard manuel" style="padding:10px;font-size:18px;">
    <button id="btn-dnf" style="padding:10px 20px;font-size:18px;">DNF</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { 
      getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp, 
      orderBy, limit, doc, updateDoc 
    } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    import { firebaseConfig } from "./firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let scanner;
    let isProcessing = false;

    const beepOk = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
    const beepError = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

    const depart = new Date();
    depart.setHours(18, 30, 0, 0);
    const departMs = depart.getTime();

    const limitesTours = {
      1: 45, 2: 88, 3: 129, 4: 168, 5: 205,
      6: 240, 7: 273, 8: 305, 9: 334, 10: 361
    };

    function showMessage(msg, color="white"){
        const fb = document.getElementById("feedback");
        fb.style.color = color;
        fb.innerHTML = msg;
    }

    async function handleScan(decodedText){

      const dossard = decodedText.split("-").pop().trim();

      const q = query(collection(db, "coureurs"), where("dossard", "==", dossard));
      const snap = await getDocs(q);

      if (snap.empty) {
        beepError.play();
        showMessage("❌ Dossard inconnu : " + dossard, "red");
        return;
      }

      const docCoureur = snap.docs[0];
      const coureur = docCoureur.data();

      if (coureur.statut === "ELIMINE" || coureur.statut === "DNF") {
        beepError.play();
        showMessage("⛔ COUREUR NON AUTORISÉ (" + dossard + ")", "red");
        return;
      }

      const qLast = query(
        collection(db, "resultats"),
        where("dossard", "==", dossard),
        orderBy("timestamp", "desc"),
        limit(1)
      );

      const lastSnap = await getDocs(qLast);

      if (!lastSnap.empty) {
        const last = lastSnap.docs[0].data();
        const lastTime = last.timestamp.toDate().getTime();
        const now = Date.now();

        if (now - lastTime < 15000) {
          beepError.play();
          showMessage("⏳ Attendre 15 sec avant un nouveau scan", "orange");
          return;
        }
      }

      const qCount = query(collection(db, "resultats"), where("dossard", "==", dossard));
      const countSnap = await getDocs(qCount);
      const tour = countSnap.size + 1;

      const nowMs = Date.now();
      const ecouleMinutes = (nowMs - departMs) / 60000;
      const limite = limitesTours[tour];

      let horsDelai = false;

      if (limite !== undefined && ecouleMinutes > limite) {
        horsDelai = true;

        await updateDoc(doc(db, "coureurs", docCoureur.id), {
          statut: "ELIMINE"
        });
      }

      await addDoc(collection(db, "resultats"), {
        dossard: dossard,
        tour: tour,
        timestamp: serverTimestamp(),
        horsDelai: horsDelai
      });

      if (horsDelai) {
        beepError.play();
        showMessage(
          "⚠️ Hors délai<br>Dossard : " + dossard + "<br>Tour : " + tour,
          "orange"
        );
      } else {
        beepOk.play();
        showMessage(
          "✅ Scan OK<br>Dossard : " + dossard + "<br>Tour : " + tour,
          "lime"
        );
      }
    }

    function onScanSuccess(decodedText){
        if(isProcessing) return;

        isProcessing = true;
        scanner.pause(true);

        handleScan(decodedText)
          .catch(err => {
            beepError.play();
            showMessage("❌ Erreur Firebase :<br>" + err.message, "red");
          })
          .finally(()=>{
            setTimeout(()=>{
              scanner.resume();
              isProcessing = false;
            }, 1200);
          });
    }

    scanner = new Html5QrcodeScanner("reader",{ fps:10, qrbox:220 });
    scanner.render(onScanSuccess);

    document.getElementById("btn-dnf").addEventListener("click", async () => {
      const dossard = document.getElementById("dossard-manuel").value.trim();
      if (!dossard) return;

      const q = query(collection(db, "coureurs"), where("dossard", "==", dossard));
      const snap = await getDocs(q);

      if (snap.empty) {
        beepError.play();
        showMessage("❌ Dossard inconnu : " + dossard, "red");
        return;
      }

      const docCoureur = snap.docs[0];

      await updateDoc(doc(db, "coureurs", docCoureur.id), {
        statut: "DNF"
      });

      beepError.play();
      showMessage("🏳️ Coureur " + dossard + " marqué DNF", "orange");
    });

  </script>

</body>
</html>
