<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Résultats</title>
</head>
<body style="background:#000;color:white;font-family:Arial;text-align:center;">
  <h1>📊 Résultats</h1>
  <a href="index.html" style="color:gray;">⬅ Retour</a>

  <div id="onglets" style="margin:20px;"></div>
  <div id="contenu"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } 
      from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    import { firebaseConfig } from "./firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const div = document.getElementById("contenu");

    const depart = new Date();
    depart.setHours(16, 0, 0, 0);

    function formatTemps(ms) {
      const totalSec = Math.floor(ms / 1000);
      const h = String(Math.floor(totalSec / 3600)).padStart(2, "0");
      const m = String(Math.floor((totalSec % 3600) / 60)).padStart(2, "0");
      const s = String(totalSec % 60).padStart(2, "0");
      return `${h}:${m}:${s}`;
    }

    async function chargerResultats(){
      const coureursSnap = await getDocs(collection(db, "coureurs"));
      const coureursMap = {};
      coureursSnap.forEach(doc => {
        const c = doc.data();
        coureursMap[c.dossard] = c;
      });

      const qRes = query(collection(db, "resultats"), orderBy("timestamp", "asc"));
      const resSnap = await getDocs(qRes);

      const tours = {};
      const tousLesResultats = [];

      resSnap.forEach(doc => {
        const r = doc.data();
        if (!r.tour) return;
        if (!tours[r.tour]) tours[r.tour] = [];
        tours[r.tour].push(r);
        tousLesResultats.push(r);
      });

      let ongletsHTML = `<button onclick="afficherGeneral()" style="margin:5px;">Général</button>`;
      const toursOrdonnés = Object.keys(tours).map(Number).sort((a,b)=>a-b);
      toursOrdonnés.forEach(t => {
        ongletsHTML += `<button onclick="afficherTour(${t})" style="margin:5px;">Tour ${t}</button>`;
      });
      document.getElementById("onglets").innerHTML = ongletsHTML;

      window.afficherTour = function(tour) {
        const liste = tours[tour] || [];
        let html = `<h2>Tour ${tour}</h2>`;
        html += "<table border='1' style='margin:auto;color:white;'><tr><th>#</th><th>Dossard</th><th>Nom</th><th>Prénom</th><th>Temps</th></tr>";

        liste.sort((a,b)=>a.timestamp.toDate()-b.timestamp.toDate());

        let rank = 1;
        liste.forEach(r => {
          const c = coureursMap[r.dossard] || {};
          const date = r.timestamp.toDate();
          const temps = formatTemps(date - depart);

          const rouge = (r.horsDelai || c.statut === "DNF" || c.statut === "ELIMINE");
          const rose = (!rouge && c.categorie === "F");
          const style = rouge
            ? "style='color:red;font-weight:bold;'"
            : rose
              ? "style='color:#ff66cc;font-weight:bold;'"
              : "style='color:white;'";

          html += `
            <tr ${style}>
              <td>${rank++}</td>
              <td>${r.dossard}</td>
              <td>${c.nom || ""}</td>
              <td>${c.prenom || ""}</td>
              <td>${temps}</td>
            </tr>
          `;
        });

        html += "</table>";
        div.innerHTML = html;
      };

      window.afficherGeneral = function() {
        let html = `<h2>Classement général</h2>`;
        html += "<table border='1' style='margin:auto;color:white;'><tr><th>#</th><th>Dossard</th><th>Nom</th><th>Prénom</th><th>Tour atteint</th><th>Temps</th></tr>";

        const parCoureur = {};

        tousLesResultats.forEach(r => {
          const d = r.dossard;
          if (!parCoureur[d]) parCoureur[d] = [];
          parCoureur[d].push(r);
        });

        const classement = [];

        Object.keys(parCoureur).forEach(dossard => {
          const scans = parCoureur[dossard];
          scans.sort((a,b)=>a.timestamp.toDate()-b.timestamp.toDate());
          const dernier = scans[scans.length - 1];
          const date = dernier.timestamp.toDate();
          const temps = formatTemps(date - depart);
          const c = coureursMap[dossard] || {};

          classement.push({
            dossard,
            nom: c.nom || "",
            prenom: c.prenom || "",
            tour: dernier.tour,
            tempsMs: date - depart,
            temps,
            rouge: (dernier.horsDelai || c.statut === "DNF" || c.statut === "ELIMINE"),
            categorie: c.categorie
          });
        });

        classement.sort((a,b)=>{
          if (b.tour !== a.tour) return b.tour - a.tour;
          return a.tempsMs - b.tempsMs;
        });

        let rank = 1;
        classement.forEach(r => {
          const style = r.rouge
            ? "style='color:red;font-weight:bold;'"
            : r.categorie === "F"
              ? "style='color:#ff66cc;font-weight:bold;'"
              : "style='color:white;'";

          html += `
            <tr ${style}>
              <td>${rank++}</td>
              <td>${r.dossard}</td>
              <td>${r.nom}</td>
              <td>${r.prenom}</td>
              <td>${r.tour}</td>
              <td>${r.temps}</td>
            </tr>
          `;
        });

        html += "</table>";
        div.innerHTML = html;
      };

      afficherGeneral();
    }

    chargerResultats();
  </script>
</body>
</html>
