<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>SCAN COURSE</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body style="background:#000;color:white;font-family:Arial;text-align:center;">

  <h1>🏁 SCAN</h1>
  <a href="index.html" style="color:gray;">⬅ Retour</a>

  <div id="reader" style="width:320px;margin:20px auto;"></div>
  <div id="feedback" style="font-size:26px;font-weight:bold;margin-top:20px;"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { 
      getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp, 
      orderBy, limit, doc, updateDoc 
    } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    import { firebaseConfig } from "./firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let scanner;
    let isProcessing = false;

    const beepOk = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
    const beepError = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

    // Heure de départ : 16h00 aujourd'hui
    const depart = new Date();
    depart.setHours(16, 0, 0, 0);
    const departMs = depart.getTime();

    // Limites de temps par tour (en minutes)
    const limitesTours = {
      1: 45,
      2: 43,
      3: 41,
      4: 39,
      5: 37,
      6: 35,
      7: 33,
      8: 31,
      9: 29,
      10: 27
    };

    function showMessage(msg, color="white"){
        const fb = document.getElementById("feedback");
        fb.style.color = color;
        fb.innerHTML = msg;
    }

    async function handleScan(decodedText){

      // Extraire le dossard après le tiret (COURSE2026-101 → 101)
      const dossard = decodedText.split("-").pop().trim();

      // Vérifier si le coureur existe
      const q = query(collection(db, "coureurs"), where("dossard", "==", dossard));
      const snap = await getDocs(q);

      if (snap.empty) {
        beepError.play();
        showMessage("❌ Dossard inconnu : " + dossard, "red");
        return;
      }

      const docCoureur = snap.docs[0];
      const coureur = docCoureur.data();

      if (coureur.statut === "ELIMINE") {
        beepError.play();
        showMessage("⛔ COUREUR ÉLIMINÉ (" + dossard + ")", "red");
        return;
      }

      // Vérifier le dernier scan (anti double-scan 15 sec)
      const qLast = query(
        collection(db, "resultats"),
        where("dossard", "==", dossard),
        orderBy("timestamp", "desc"),
        limit(1)
      );

      const lastSnap = await getDocs(qLast);

      if (!lastSnap.empty) {
        const last = lastSnap.docs[0].data();
        const lastTime = last.timestamp.toDate().getTime();
        const now = Date.now();

        if (now - lastTime < 15000) {
          beepError.play();
          showMessage("⏳ Attendre 15 sec avant un nouveau scan", "orange");
          return;
        }
      }

      // Déterminer le numéro du tour (nombre de scans précédents + 1)
      const qCount = query(collection(db, "resultats"), where("dossard", "==", dossard));
      const countSnap = await getDocs(qCount);
      const tour = countSnap.size + 1;

      // Vérifier la limite de temps pour ce tour
      const nowMs = Date.now();
      const ecouleMinutes = (nowMs - departMs) / 60000;
      const limite = limitesTours[tour];

      if (limite !== undefined && ecouleMinutes > limite) {
        // Le coureur est éliminé pour ce tour
        await updateDoc(doc(db, "coureurs", docCoureur.id), {
          statut: "ELIMINE"
        });
        beepError.play();
        showMessage(
          "⛔ Temps dépassé pour le tour " + tour + "<br>Dossard " + dossard + " ÉLIMINÉ",
          "red"
        );
        return;
      }

      // Enregistrer le résultat
      await addDoc(collection(db, "resultats"), {
        dossard: dossard,
        tour: tour,
        timestamp: serverTimestamp()
      });

      beepOk.play();
      showMessage(
        "✅ Scan OK<br>Dossard : " + dossard + "<br>🏁 Tour : " + tour,
        "lime"
      );
    }

    function onScanSuccess(decodedText){
        if(isProcessing) return;

        isProcessing = true;
        scanner.pause(true);

        handleScan(decodedText)
          .catch(err => {
            console.error(err);
            beepError.play();
            showMessage("❌ Erreur Firebase","red");
          })
          .finally(()=>{
            setTimeout(()=>{
              scanner.resume();
              isProcessing = false;
            }, 1200);
          });
    }

    scanner = new Html5QrcodeScanner("reader",{ fps:10, qrbox:220 });
    scanner.render(onScanSuccess);
  </script>

</body>
</html>
