<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>SCAN COURSE</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body style="background:#000;color:white;font-family:Arial;text-align:center;">

  <!-- 🔒 VERROUILLAGE PAR MOT DE PASSE -->
  <div id="lock" style="position:fixed;top:0;left:0;width:100%;height:100%;background:black;color:white;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999;">
    <h2>🔒 Accès protégé</h2>
    <input id="pwd" type="password" placeholder="Mot de passe" style="padding:10px;font-size:20px;">
    <button onclick="checkPwd()" style="padding:10px 20px;margin-top:10px;font-size:20px;">Entrer</button>
    <div id="err" style="color:red;margin-top:10px;"></div>
  </div>

  <script>
  function checkPwd(){
    const good = "3sRunTravel2026";
    const val = document.getElementById("pwd").value;
    if(val === good){
      document.getElementById("lock").style.display = "none";
    } else {
      document.getElementById("err").innerHTML = "Mot de passe incorrect";
    }
  }
  </script>

  <h1>🏁 SCAN</h1>
  <a href="index.html" style="color:gray;">⬅ Retour</a>

  <div id="reader" style="width:320px;margin:20px auto;"></div>
  <div id="feedback" style="font-size:26px;font-weight:bold;margin-top:20px;"></div>

  <!-- DNF MANUEL -->
  <div style="margin-top:20px;">
    <input id="dossard-manuel" type="text" placeholder="Dossard manuel" style="padding:10px;font-size:18px;">
    <button id="btn-dnf" style="padding:10px 20px;font-size:18px;">DNF</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { 
      getFirestore, collection, query, where, getDocs, addDoc, serverTimestamp,
      orderBy, limit, doc, updateDoc, onSnapshot
    } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    import { firebaseConfig } from "./firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let scanner;
    let isProcessing = false;

    const beepOk = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
    const beepError = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

    /* 🔥 Départ Firestore */
    let departMs = null;

    /* 🔥 Limites Firestore */
    let limites = {};

    /* 🔥 Départs théoriques */
    let departTours = {};

    function recalculerDepartTours() {
      if (!departMs || !limites) return;

      departTours = {};
      let cumul = 0;

      for (let i = 1; i <= 10; i++) {
        departTours[i] = departMs + cumul * 60000;
        cumul += limites["t" + i] || 0;
      }
    }

    /* Charger départ */
    onSnapshot(doc(db, "course", "depart"), snap => {
      if (snap.exists()) {
        departMs = snap.data().timestamp.toDate().getTime();
        recalculerDepartTours();
        showMessage("Départ chargé ✔", "lime");
      }
    });

    /* Charger limites */
    onSnapshot(doc(db, "course", "limitesTours"), snap => {
      if (snap.exists()) {
        limites = snap.data();
        recalculerDepartTours();
      }
    });

    function showMessage(msg, color="white"){
      const fb = document.getElementById("feedback");
      fb.style.color = color;
      fb.innerHTML = msg;
    }

    /* 🔍 Fonction principale de scan */
    async function handleScan(decodedText){

      if (!departMs || Object.keys(limites).length === 0) {
        showMessage("⏳ Initialisation…", "orange");
        return;
      }

      const dossard = decodedText.split("-").pop().trim();

      /* Vérifier si le coureur existe */
      const q = query(collection(db, "coureurs"), where("dossard", "==", dossard));
      const snap = await getDocs(q);

      if (snap.empty) {
        beepError.play();
        showMessage("❌ Dossard inconnu : " + dossard, "red");
        return;
      }

      const docCoureur = snap.docs[0];
      const coureur = docCoureur.data();

      /* ❌ Coureur éliminé ou DNF → interdit */
      if (coureur.statut === "ELIMINE" || coureur.statut === "DNF") {
        beepError.play();
        showMessage("⛔ Coureur non autorisé (" + dossard + ")", "red");
        return;
      }

      /* Anti double-scan 15 sec */
      const qLast = query(
        collection(db, "resultats"),
        where("dossard", "==", dossard),
        orderBy("timestamp", "desc"),
        limit(1)
      );

      const lastSnap = await getDocs(qLast);

      if (!lastSnap.empty) {
        const last = lastSnap.docs[0].data();
        const lastTime = last.timestamp?.toDate()?.getTime?.() ?? 0;
        const now = Date.now();

        if (now - lastTime < 15000) {
          beepError.play();
          showMessage("⏳ Attendre 15 sec avant un nouveau scan", "orange");
          return;
        }
      }

      /* Déterminer le numéro du tour */
      const qCount = query(collection(db, "resultats"), where("dossard", "==", dossard));
      const countSnap = await getDocs(qCount);
      const tour = countSnap.size + 1;

      /* Vérifier limite du tour */
      const nowMs = Date.now();
      const limite = limites["t" + tour] || 0;
      const departTheorique = departTours[tour];
      const minutesDepuisDepart = (nowMs - departTheorique) / 60000;

      let horsDelai = false;

      if (minutesDepuisDepart > limite) {
        horsDelai = true;

        /* ELIMINATION */
        await updateDoc(doc(db, "coureurs", docCoureur.id), {
          statut: "ELIMINE"
        });
      }

      /* Enregistrer le scan */
      await addDoc(collection(db, "resultats"), {
        dossard: dossard,
        tour: tour,
        timestamp: serverTimestamp(),
        horsDelai: horsDelai
      });

      /* Calcul du ratio */
      let totalEnCourse = 0;
      let dejaArrives = 0;

      const resultatsSnap = await getDocs(collection(db, "resultats"));

      const validesPrecedent = new Set();
      const validesTourActuel = new Set();

      resultatsSnap.forEach(docR => {
        const r = docR.data();
        if (r.tour === tour - 1 && !r.horsDelai) validesPrecedent.add(r.dossard);
        if (r.tour === tour) validesTourActuel.add(r.dossard);
      });

      totalEnCourse = tour === 1 ? (await getDocs(collection(db,"coureurs"))).size - 1 : validesPrecedent.size;
      dejaArrives = validesTourActuel.size;

      /* Affichage */
      if (horsDelai) {
        beepError.play();
        showMessage(
          `⚠️ Hors délai<br>Dossard : ${dossard}<br>Tour : ${tour}<br><br>Arrivés : ${dejaArrives}/${totalEnCourse}`,
          "orange"
        );
      } else {
        beepOk.play();
        showMessage(
          `✅ Scan OK<br>Dossard : ${dossard}<br>Tour : ${tour}<br><br>Arrivés : ${dejaArrives}/${totalEnCourse}`,
          "lime"
        );
      }
    }

    function onScanSuccess(decodedText){
      if(isProcessing) return;

      isProcessing = true;
      scanner.pause(true);

      handleScan(decodedText)
        .catch(err => {
          beepError.play();
          showMessage("❌ Erreur Firebase :<br>" + err.message, "red");
        })
        .finally(()=>{
          setTimeout(()=>{
            scanner.resume();
            isProcessing = false;
          }, 1200);
        });
    }

    scanner = new Html5QrcodeScanner("reader",{ fps:10, qrbox:220 });
    scanner.render(onScanSuccess);

    /* DNF manuel */
    document.getElementById("btn-dnf").addEventListener("click", async () => {
      const dossard = document.getElementById("dossard-manuel").value.trim();
      if (!dossard) return;

      const q = query(collection(db, "coureurs"), where("dossard", "==", dossard));
      const snap = await getDocs(q);

      if (snap.empty) {
        beepError.play();
        showMessage("❌ Dossard inconnu : " + dossard, "red");
        return;
      }

      const docCoureur = snap.docs[0];

      await updateDoc(doc(db, "coureurs", docCoureur.id), {
        statut: "DNF"
      });

      beepError.play();
      showMessage("🏳️ Coureur " + dossard + " marqué DNF", "orange");
    });

  </script>

</body>
</html>
