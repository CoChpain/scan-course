<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SCAN COURSE</title>
<script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body style="background:#000;color:white;font-family:Arial;text-align:center;">

<h1>🏁 SCAN</h1>

<div id="reader" style="width:320px;margin:20px auto;"></div>
<div id="feedback" style="font-size:26px;font-weight:bold;margin-top:20px;"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import {
getFirestore, collection, query, where,
getDocs, addDoc, serverTimestamp,
orderBy, limit, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

import { firebaseConfig } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let scanner;
let isProcessing = false;

const beepOk = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
const beepError = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

function showMessage(msg,color="white"){
const fb = document.getElementById("feedback");
fb.style.color=color;
fb.innerHTML=msg;
}

async function handleScan(decodedText){

const dossard = decodedText.split("-").pop().trim();

/* vérifier coureur */

const q = query(collection(db,"coureurs"),where("dossard","==",dossard));
const snap = await getDocs(q);

if(snap.empty){
beepError.play();
showMessage("❌ Dossard inconnu "+dossard,"red");
return;
}

const docCoureur = snap.docs[0];
const coureur = docCoureur.data();

if(coureur.statut==="ELIMINE" || coureur.statut==="DNF"){
beepError.play();
showMessage("⛔ Coureur non autorisé","red");
return;
}

/* anti double scan */

const qLast = query(
collection(db,"resultats"),
where("dossard","==",dossard),
orderBy("timestamp","desc"),
limit(1)
);

const lastSnap = await getDocs(qLast);

if(!lastSnap.empty){

const last = lastSnap.docs[0].data();
const lastTime = last.timestamp?.toDate()?.getTime?.() ?? 0;

if(Date.now()-lastTime < 10000){
beepError.play();
showMessage("⏳ Attendre 10 sec","orange");
return;
}

}

/* calcul tour fiable */

const qLastTour = query(
collection(db,"resultats"),
where("dossard","==",dossard),
orderBy("tour","desc"),
limit(1)
);

const lastTourSnap = await getDocs(qLastTour);

let tour=1;

if(!lastTourSnap.empty){
tour = lastTourSnap.docs[0].data().tour + 1;
}

/* enregistrer scan */

await addDoc(collection(db,"resultats"),{
dossard:dossard,
tour:tour,
timestamp:serverTimestamp(),
horsDelai:false
});

if(navigator.vibrate) navigator.vibrate(120);

beepOk.play();

showMessage(
`✅ Scan OK<br>
Dossard ${dossard}<br>
Tour ${tour}`,
"lime"
);

}

function onScanSuccess(decodedText){

if(isProcessing) return;

isProcessing=true;
scanner.pause(true);

handleScan(decodedText)
.catch(err=>{
beepError.play();
showMessage(err.message,"red");
})
.finally(()=>{
setTimeout(()=>{
scanner.resume();
isProcessing=false;
},700);
});

}

scanner = new Html5QrcodeScanner("reader",{fps:10,qrbox:220});
scanner.render(onScanSuccess);

</script>
</body>
</html>
