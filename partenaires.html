<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Partenaires - Diaporama</title>

<style>
body{
  background:#000;
  color:#fff;
  font-family:Arial,sans-serif;
  text-align:center;
  margin:0;
  padding:0;
}

h1{
  font-size:50px;
  margin-top:40px;
  letter-spacing:4px;
  color:#ffcc00;
  text-shadow:0 0 15px #ffcc00;
}

/* SLIDESHOW */
.slideshow{
  margin-top:60px;
  width:60%;
  margin-left:auto;
  margin-right:auto;
  position:relative;
  height:250px;
}

.slide{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  opacity:0;
  transition:opacity 1s ease-in-out;
}

.slide img{
  width:100%;
  max-width:300px;
  filter:drop-shadow(0 0 10px #000);
}

.slide.active{
  opacity:1;
}
</style>
</head>

<body>

<h1>🤝 NOS PARTENAIRES</h1>

<div class="slideshow">
  <div class="slide active"><img src="IMG_6603.jpg"></div>
  <div class="slide"><img src="logo2.png"></div>
  <div class="slide"><img src="logo3.png"></div>
  <div class="slide"><img src="logo4.png"></div>
  <div class="slide"><img src="logo5.png"></div>
  <div class="slide"><img src="logo6.png"></div>
  <div class="slide"><img src="logo7.png"></div>
  <div class="slide"><img src="logo8.png"></div>
</div>

<script>
let index = 0;
const slides = document.querySelectorAll(".slide");

setInterval(() => {
  slides[index].classList.remove("active");
  index = (index + 1) % slides.length;
  slides[index].classList.add("active");
}, 2500);
</script>

</body>
</html>
