<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Partenaires</title>

<style>
body{
  background:#000;
  color:#fff;
  font-family:Arial,sans-serif;
  text-align:center;
  margin:0;
  padding:0;
}

/* TITRE */
h1{
  font-size:50px;
  margin-top:40px;
  letter-spacing:4px;
  color:#ffcc00;
  text-shadow:0 0 15px #ffcc00;
}

/* CARROUSEL */
.carousel-container{
  width:100%;
  overflow:hidden;
  margin-top:60px;
}

.carousel-track{
  display:flex;
  gap:60px;
  animation:scroll 18s linear infinite;
}

.carousel-track img{
  height:120px;
  width:auto;
  border-radius:12px;
  padding:10px;
  background:#111;
  border:2px solid #ffcc00;
  box-shadow:0 0 15px #ffcc00, 0 0 30px #ffcc00 inset;
  transition:0.3s;
}

/* Effet néon animé */
.carousel-track img:hover{
  transform:scale(1.1);
  box-shadow:
    0 0 20px #ffcc00,
    0 0 40px #ffcc00,
    0 0 60px #ffcc00 inset;
}

/* Animation horizontale infinie */
@keyframes scroll{
  0% { transform:translateX(0); }
  100% { transform:translateX(-50%); }
}
</style>
</head>

<body>

<h1>🤝 NOS PARTENAIRES</h1>

<div class="carousel-container">
  <div class="carousel-track">

    <!-- 8 logos (dupliqués pour scroll infini) -->
    <img src="logo1.png">
    <img src="logo2.png">
    <img src="logo3.png">
    <img src="logo4.png">
    <img src="logo5.png">
    <img src="logo6.png">
    <img src="logo7.png">
    <img src="logo8.png">

    <!-- DUPLICATION pour effet infini -->
    <img src="logo1.png">
    <img src="logo2.png">
    <img src="logo3.png">
    <img src="logo4.png">
    <img src="logo5.png">
    <img src="logo6.png">
    <img src="logo7.png">
    <img src="logo8.png">

  </div>
</div>

</body>
</html>
