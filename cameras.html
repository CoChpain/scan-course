<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Multi-caméras VDO.Ninja</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #222;
    color: white;
    margin: 0;
  }

  /* Onglets */
  .tabs {
    display: flex;
    background: #111;
    border-bottom: 2px solid #333;
  }
  .tab {
    padding: 15px 20px;
    cursor: pointer;
    border-right: 1px solid #333;
  }
  .tab.active {
    background: #333;
  }

  /* Contenu */
  .content {
    display: none;
    padding: 20px;
  }
  .content.active {
    display: block;
  }

  /* Grille 2x2 */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  /* Caméra */
  .camera {
    position: relative;
    background: black;
    height: 300px;
  }
  .waiting {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
    color: white;
    font-size: 18px;
  }
  video {
    width: 100%;
    height: 100%;
    display: none;
    background: black;
  }
</style>
</head>
<body>

<!-- Onglets -->
<div class="tabs">
  <div class="tab active" data-target="all">Toutes les caméras</div>
  <div class="tab" data-target="cam1">Caméra 1</div>
  <div class="tab" data-target="cam2">Caméra 2</div>
  <div class="tab" data-target="cam3">Caméra 3</div>
  <div class="tab" data-target="cam4">Caméra 4</div>
</div>

<!-- Contenu : Vue globale -->
<div id="all" class="content active">
  <div class="grid">
    <div class="camera" data-id="ID_CAM1"><div class="waiting">Caméra 1 hors ligne…</div><video autoplay playsinline></video></div>
    <div class="camera" data-id="ID_CAM2"><div class="waiting">Caméra 2 hors ligne…</div><video autoplay playsinline></video></div>
    <div class="camera" data-id="ID_CAM3"><div class="waiting">Caméra 3 hors ligne…</div><video autoplay playsinline></video></div>
    <div class="camera" data-id="ID_CAM4"><div class="waiting">Caméra 4 hors ligne…</div><video autoplay playsinline></video></div>
  </div>
</div>

<!-- Contenu : Caméras individuelles -->
<div id="cam1" class="content">
  <div class="camera" data-id="hWbXrzM"><div class="waiting">Caméra 1 hors ligne…</div><video autoplay playsinline></video></div>
</div>

<div id="cam2" class="content">
  <div class="camera" data-id="ID_CAM2"><div class="waiting">Caméra 2 hors ligne…</div><video autoplay playsinline></video></div>
</div>

<div id="cam3" class="content">
  <div class="camera" data-id="ID_CAM3"><div class="waiting">Caméra 3 hors ligne…</div><video autoplay playsinline></video></div>
</div>

<div id="cam4" class="content">
  <div class="camera" data-id="ID_CAM4"><div class="waiting">Caméra 4 hors ligne…</div><video autoplay playsinline></video></div>
</div>

<script>
/* Gestion des onglets */
document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    document.querySelectorAll(".content").forEach(c => c.classList.remove("active"));

    tab.classList.add("active");
    document.getElementById(tab.dataset.target).classList.add("active");
  });
});

/* Gestion des caméras */
document.querySelectorAll(".camera").forEach(cam => {
  const id = cam.dataset.id;
  const video = cam.querySelector("video");
  const waiting = cam.querySelector(".waiting");

  const iframe = document.createElement("iframe");
  iframe.src = `https://vdo.ninja/?view=${id}&cleanoutput`;
  iframe.style.display = "none";
  document.body.appendChild(iframe);

  window.addEventListener("message", event => {
    if (!event.data) return;

    if (event.data.type === "addVideoStream") {
      video.srcObject = event.data.stream;
      video.style.display = "block";
      waiting.style.display = "none";
    }

    if (event.data.type === "removeVideoStream") {
      video.srcObject = null;
      video.style.display = "none";
      waiting.style.display = "flex";
    }
  });
});
</script>

</body>
</html>
