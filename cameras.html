<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Apollo Run - Multi Caméras</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

/* barre onglets */

.tabs{
display:flex;
background:#000;
border-bottom:2px solid #333;
}

.tab{
padding:15px 20px;
cursor:pointer;
border-right:1px solid #333;
}

.tab.active{
background:#333;
}

/* contenu */

.content{
display:none;
padding:15px;
}

.content.active{
display:block;
}

/* grille 2x2 */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

/* caméra */

.camera{
background:black;
aspect-ratio:16/9;
border:2px solid #333;
}

iframe{
width:100%;
height:100%;
border:none;
}

@media(max-width:900px){

.grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<!-- onglets -->

<div class="tabs">

<div class="tab active" data-target="all">
Toutes les caméras
</div>

<div class="tab" data-target="cam1">
Caméra 1
</div>

<div class="tab" data-target="cam2">
Caméra 2
</div>

<div class="tab" data-target="cam3">
Caméra 3
</div>

<div class="tab" data-target="cam4">
Caméra 4
</div>

</div>


<!-- vue globale -->

<div id="all" class="content active">

<div class="grid">

<div class="camera">
<iframe src="https://vdo.ninja/?view=6y6cwRA&solo&room=testaa09A&password=aaa"></iframe>
</div>

<div class="camera">
<iframe src="https://vdo.ninja/?view=cam2&room=ApolloRun_2026&password=3sRuntravel2026&cleanoutput&transparent&autoplay&muted&latency=0&bitrate=2500"></iframe>
</div>

<div class="camera">
<iframe src="https://vdo.ninja/?view=cam3&room=ApolloRun_2026&password=3sRuntravel2026&cleanoutput&transparent&autoplay&muted&latency=0&bitrate=2500"></iframe>
</div>

<div class="camera">
<iframe src="https://vdo.ninja/?view=cam4&room=ApolloRun_2026&password=3sRuntravel2026&cleanoutput&transparent&autoplay&muted&latency=0&bitrate=2500"></iframe>
</div>

</div>

</div>


<!-- cam1 -->

<div id="cam1" class="content">

<div class="camera">

<iframe src="https://vdo.ninja/?view=6y6cwRA&solo&room=testaa09A&password=aaa"></iframe>

</div>

</div>


<!-- cam2 -->

<div id="cam2" class="content">

<div class="camera">

<iframe src="https://vdo.ninja/?view=cam2&room=ApolloRun_2026&password=3sRuntravel2026&cleanoutput&latency=0&bitrate=2500"></iframe>

</div>

</div>


<!-- cam3 -->

<div id="cam3" class="content">

<div class="camera">

<iframe src="https://vdo.ninja/?view=cam3&room=ApolloRun_2026&password=3sRuntravel2026&cleanoutput&latency=0&bitrate=2500"></iframe>

</div>

</div>


<!-- cam4 -->

<div id="cam4" class="content">

<div class="camera">

<iframe src="https://vdo.ninja/?view=cam4&room=ApolloRun_2026&password=3sRuntravel2026&cleanoutput&latency=0&bitrate=2500"></iframe>

</div>

</div>



<script>

/* gestion onglets */

document.querySelectorAll(".tab").forEach(tab=>{

tab.addEventListener("click",()=>{

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
document.querySelectorAll(".content").forEach(c=>c.classList.remove("active"));

tab.classList.add("active");

document.getElementById(tab.dataset.target).classList.add("active");

});

});

</script>


</body>
</html>
