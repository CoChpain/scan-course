<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Multi-caméras VDO.Ninja</title>

<style>
body{
  font-family:Arial;
  background:#222;
  color:white;
  margin:0;
}

.tabs{
  display:flex;
  background:#111;
}

.tab{
  padding:15px 20px;
  cursor:pointer;
  border-right:1px solid #333;
}

.tab.active{
  background:#333;
}

.content{
  display:none;
  padding:20px;
}

.content.active{
  display:block;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.camera{
  background:black;
  height:300px;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body>

<div class="tabs">
<div class="tab active" data-target="all">Toutes les caméras</div>
<div class="tab" data-target="cam1">Caméra 1</div>
<div class="tab" data-target="cam2">Caméra 2</div>
<div class="tab" data-target="cam3">Caméra 3</div>
<div class="tab" data-target="cam4">Caméra 4</div>
</div>

<!-- Vue globale -->
<div id="all" class="content active">
<div class="grid">

<div class="camera">
<iframe src="https://vdo.ninja/?view=cam1&room=ApolloRun_2026&password=3sRuntravel2026&cleanoutput&autoplay&muted"></iframe>
</div>

<div class="camera">
<iframe src="https://vdo.ninja/?view=cam2&room=ApolloRun_2026&password=3sRuntravel2026&cleanoutput&autoplay&muted"></iframe>
</div>

<div class="camera">
<iframe src="https://vdo.ninja/?view=cam3&room=ApolloRun_2026&password=3sRuntravel2026&cleanoutput&autoplay&muted"></iframe>
</div>

<div class="camera">
<iframe src="https://vdo.ninja/?view=cam4&room=ApolloRun_2026&password=3sRuntravel2026&cleanoutput&autoplay&muted"></iframe>
</div>

</div>
</div>

<!-- Caméra 1 -->
<div id="cam1" class="content">
<div class="camera">
<iframe src="https://vdo.ninja/?view=cam1&room=ApolloRun_2026&password=3sRuntravel2026&cleanoutput"></iframe>
</div>
</div>

<!-- Caméra 2 -->
<div id="cam2" class="content">
<div class="camera">
<iframe src="https://vdo.ninja/?view=cam2&room=ApolloRun_2026&password=3sRuntravel2026&cleanoutput"></iframe>
</div>
</div>

<!-- Caméra 3 -->
<div id="cam3" class="content">
<div class="camera">
<iframe src="https://vdo.ninja/?view=cam3&room=ApolloRun_2026&password=3sRuntravel2026&cleanoutput"></iframe>
</div>
</div>

<!-- Caméra 4 -->
<div id="cam4" class="content">
<div class="camera">
<iframe src="https://vdo.ninja/?view=cam4&room=ApolloRun_2026&password=3sRuntravel2026&cleanoutput"></iframe>
</div>
</div>

<script>
document.querySelectorAll(".tab").forEach(tab=>{
  tab.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    document.querySelectorAll(".content").forEach(c=>c.classList.remove("active"));

    tab.classList.add("active");
    document.getElementById(tab.dataset.target).classList.add("active");
  });
});
</script>

</body>
</html>
