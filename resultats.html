<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Résultats</title>

<style>
body{
  background:#000;
  color:white;
  font-family:Arial;
  text-align:center;
}

/* PARTENAIRES défilants */
.partenaires-marquee {
  width: 100%;
  overflow: hidden;
  background: #111;
  border-top: 2px solid #444;
  margin-top: 25px;
  padding: 10px 0;
  position: sticky;
  bottom: 0;
  z-index: 100;
}

.partenaires-track {
  display: flex;
  gap: 40px;
  will-change: transform;
}

.partenaires-track img {
  height: 75px;
  width: auto;
  object-fit: contain;
  filter: drop-shadow(0 0 4px #000);
}

.columns{
  display:grid;
  gap:10px;
  width:98%;
  margin:auto;
}

.cols-1{grid-template-columns:repeat(1,1fr);}
.cols-2{grid-template-columns:repeat(2,1fr);}
.cols-3{grid-template-columns:repeat(3,1fr);}
.cols-4{grid-template-columns:repeat(4,1fr);}

@media (max-width: 768px) {
  .cols-4, .cols-3, .cols-2, .cols-1 {
    grid-template-columns:repeat(1,1fr);
  }
}

table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
  border:2px solid #555;
}

th,td{
  border:1px solid #333;
  padding:3px;
}

th{
  background:#111;
}

tr:nth-child(even){
  background:rgba(255,255,255,0.05);
}

.red{
  color:red;
  font-weight:bold;
}

.femme{
  color:#ff66cc;
  font-weight:bold;
}

.fade{
  animation:fade 0.4s;
}

@keyframes fade{
  from{opacity:0}
  to{opacity:1}
}

button{
  margin:4px;
  padding:8px 12px;
  font-size:14px;
}
</style>

</head>

<body>

<h1>📊 Résultats</h1>
<a href="index.html" style="color:gray">⬅ Retour</a>

<div id="chrono-global" style="font-size:28px;color:#00ff99;margin-top:20px;">
⏱️ Chrono global : --:--:--
</div>

<div id="onglets" style="margin:20px"></div>
<div id="contenu"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import {
  getFirestore, collection, query, orderBy, onSnapshot, doc
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
import { firebaseConfig } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const div = document.getElementById("contenu");

let coureursMap = {};
let tours = {};
let tousLesResultats = {};
let startMs = null;
let limites = {};
let departTours = {};
let ongletActif = "general";
let totalParTour = {};

/* 🔥 Défilement JS */
function lancerDefilementLogos() {
  const track = document.querySelector(".partenaires-track");
  if (!track) return;

  let position = 0;
  const vitesse = 0.05;
  let lastTime = performance.now();

  function animate(now) {
    const delta = now - lastTime;
    lastTime = now;

    position -= vitesse * delta;

    const width = track.scrollWidth / 2;

    if (Math.abs(position) >= width) {
      position = 0;
    }

    track.style.transform = `translateX(${position}px)`;

    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
}

/* DATA FIREBASE */
onSnapshot(doc(db,"course","depart"), snap=>{
  if(snap.exists()){
    startMs = snap.data().startMs;
    recalculerDepartTours();
    rafraichir();
  }
});

onSnapshot(doc(db,"course","limitesTours"), snap=>{
  if(snap.exists()){
    limites = snap.data();
    recalculerDepartTours();
    rafraichir();
  }
});

function recalculerDepartTours(){
  if(!startMs || !limites) return;
  departTours={};
  let cumul=0;
  for(let i=1;i<=200;i++){
    if(!limites["t"+i]) break;
    departTours[i]=startMs + cumul*60000;
    cumul+=limites["t"+i];
  }
}

function formatTemps(ms){
  if(!ms||ms<0) return "--:--:--";
  const s=Math.floor(ms/1000);
  const h=String(Math.floor(s/3600)).padStart(2,"0");
  const m=String(Math.floor((s%3600)/60)).padStart(2,"0");
  const sec=String(s%60).padStart(2,"0");
  return `${h}:${m}:${sec}`;
}

function updateChronos(){
  if(!startMs) return;
  const now = Date.now();
  const globalMs = now - startMs;
  document.getElementById("chrono-global").innerHTML =
    "⏱️ Chrono global : " + formatTemps(globalMs);
}
setInterval(updateChronos, 1000);

/* 🔥 AFFICHAGE TOUR */
window.afficherTour=function(tour){
  ongletActif=tour;
  let liste=[...(tours[tour]||[])];

  let html=`<h2>Tour ${tour}</h2>`;
  html+=`<div class="columns cols-2">`;

  liste.forEach((r,i)=>{
    html+=`
    <table>
      <tr><th>#</th><th>Dossard</th><th>Nom</th></tr>
      <tr>
        <td>${i+1}</td>
        <td>${r.dossard}</td>
        <td>${(coureursMap[r.dossard]?.nom)||""}</td>
      </tr>
    </table>`;
  });

  html+="</div>";

  html+=`
  <div class="partenaires-marquee">
    <div class="partenaires-track">
      <img src="Z1.png"><img src="Z2.png"><img src="Z3.png"><img src="Z4.png">
      <img src="Z5.png"><img src="Z6.png"><img src="Z7.png"><img src="Z8.png">
      <img src="Z1.png"><img src="Z2.png"><img src="Z3.png"><img src="Z4.png">
      <img src="Z5.png"><img src="Z6.png"><img src="Z7.png"><img src="Z8.png">
    </div>
  </div>`;

  div.innerHTML=html;
  lancerDefilementLogos();
};

/* 🔥 GENERAL */
window.afficherGeneral=function(){
  ongletActif="general";

  let html=`<h2>Classement général</h2>`;
  html+=`<div class="columns cols-2">`;

  Object.values(coureursMap).forEach((c,i)=>{
    html+=`
    <table>
      <tr><th>#</th><th>Dossard</th><th>Nom</th></tr>
      <tr>
        <td>${i+1}</td>
        <td>${c.dossard}</td>
        <td>${c.nom||""}</td>
      </tr>
    </table>`;
  });

  html+="</div>";

  /* ✅ bandeau hors grid */
  html+=`
  <div class="partenaires-marquee">
    <div class="partenaires-track">
      <img src="Z1.png"><img src="Z2.png"><img src="Z3.png"><img src="Z4.png">
      <img src="Z5.png"><img src="Z6.png"><img src="Z7.png"><img src="Z8.png">
      <img src="Z1.png"><img src="Z2.png"><img src="Z3.png"><img src="Z4.png">
      <img src="Z5.png"><img src="Z6.png"><img src="Z7.png"><img src="Z8.png">
    </div>
  </div>`;

  div.innerHTML=html;
  lancerDefilementLogos();
};

/* LISTENERS */
onSnapshot(collection(db,"coureurs"), snap=>{
  coureursMap={};
  snap.forEach(doc=>{
    const c=doc.data();
    coureursMap[c.dossard]=c;
  });
  afficherGeneral();
});
</script>

</body>
</html>
