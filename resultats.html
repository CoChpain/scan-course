<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<title>Résultats</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
text-align:center;
}

table{
border-collapse:collapse;
margin:auto;
}

th,td{
border:1px solid #444;
padding:6px 10px;
}

.red{color:red}
.femme{color:#ff66cc}

</style>

</head>

<body>

<h1>📊 Classement</h1>

<div id="classement"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";

import {
getFirestore,collection,query,
orderBy,onSnapshot
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

import { firebaseConfig } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let coureursMap = {};
let resultats = {};

function formatTemps(ms){

if(!ms) return "--";

const total = Math.floor(ms/1000);

const h = String(Math.floor(total/3600)).padStart(2,"0");
const m = String(Math.floor((total%3600)/60)).padStart(2,"0");
const s = String(total%60).padStart(2,"0");

return `${h}:${m}:${s}`;

}

function afficher(){

let classement=[];

Object.keys(resultats).forEach(dossard=>{

const scans=resultats[dossard];

scans.sort((a,b)=>a.timestamp - b.timestamp);

let total=0;

for(let i=1;i<scans.length;i++){

total += scans[i].timestamp - scans[i-1].timestamp;

}

classement.push({

dossard:dossard,
tour:scans.length,
temps:total

});

});

classement.sort((a,b)=>{

if(b.tour !== a.tour) return b.tour-a.tour;

return a.temps-b.temps;

});

let html=`<table>
<tr>
<th>#</th>
<th>Dossard</th>
<th>Tour</th>
<th>Temps</th>
</tr>`;

let rank=1;

classement.forEach(c=>{

html+=`
<tr>
<td>${rank++}</td>
<td>${c.dossard}</td>
<td>${c.tour}</td>
<td>${formatTemps(c.temps)}</td>
</tr>
`;

});

html+="</table>";

document.getElementById("classement").innerHTML=html;

}

/* listeners */

onSnapshot(collection(db,"coureurs"),snap=>{

snap.forEach(doc=>{
const c=doc.data();
coureursMap[c.dossard]=c;
});

});

onSnapshot(query(collection(db,"resultats"),orderBy("timestamp","asc")),snap=>{

resultats={};

snap.forEach(doc=>{

const r=doc.data();

if(!resultats[r.dossard]) resultats[r.dossard]=[];

resultats[r.dossard].push({
timestamp:r.timestamp?.toDate()?.getTime?.() ?? 0
});

});

afficher();

});

</script>

</body>
</html>
