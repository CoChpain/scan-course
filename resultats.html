<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Résultats</title>

  <!-- 🟦 STYLE GRILLE COMPACTE -->
  <style>
    body {
      background:#000;
      color:white;
      font-family:Arial;
      text-align:center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr); /* 4 colonnes */
      gap: 6px;
      width: 98%;
      margin: auto;
    }

    .runner {
      border: 1px solid #444;
      padding: 4px;
      font-size: 12px;
      line-height: 14px;
      background: #111;
      border-radius: 4px;
    }

    .runner.red {
      color: red;
      font-weight: bold;
    }

    .runner.femme {
      color: #ff66cc;
      font-weight: bold;
    }

    .runner div {
      margin: 1px 0;
    }

    h2, h3 {
      margin: 5px 0;
    }
  </style>

</head>

<body>
  <h1>📊 Résultats</h1>
  <a href="index.html" style="color:gray;">⬅ Retour</a>

  <div id="onglets" style="margin:20px;"></div>
  <div id="contenu"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { 
      getFirestore, collection, query, orderBy, onSnapshot 
    } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";
    import { firebaseConfig } from "./firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const div = document.getElementById("contenu");

    /* 🕒 Départ chrono = 19h30 */
    const depart = new Date();
    depart.setHours(19, 30, 0, 0);

    function formatTemps(ms) {
      if (!isFinite(ms)) return "--:--:--";
      const totalSec = Math.floor(ms / 1000);
      const h = String(Math.floor(totalSec / 3600)).padStart(2, "0");
      const m = String(Math.floor((totalSec % 3600) / 60)).padStart(2, "0");
      const s = String(totalSec % 60).padStart(2, "0");
      return `${h}:${m}:${s}`;
    }

    let coureursMap = {};
    let tours = {};
    let tousLesResultats = {};

    /* 🧠 Mémoire locale de l’onglet actif */
    let ongletActif = localStorage.getItem("ongletActif") || "general";

    function setOngletActif(val) {
      ongletActif = val;
      localStorage.setItem("ongletActif", val);
    }

    function construireOnglets() {
      let html = `<button onclick="afficherGeneral()" style="margin:5px;">Général</button>`;
      const toursOrdonnés = Object.keys(tours).map(Number).sort((a,b)=>a-b);
      toursOrdonnés.forEach(t => {
        html += `<button onclick="afficherTour(${t})" style="margin:5px;">Tour ${t}</button>`;
      });
      document.getElementById("onglets").innerHTML = html;
    }

    /* 🟦 AFFICHAGE D’UN TOUR */
    window.afficherTour = function(tour) {
      setOngletActif(tour);

      let liste = [...(tours[tour] || [])];

      /* Ajouter les DNF */
      Object.keys(coureursMap).forEach(dossard => {
        const c = coureursMap[dossard];

        if (c.statut === "ELIMINE") return;

        const aValideTour = tours[tour]?.some(r => r.dossard == dossard);
        const aValideTourPrecedent = tours[tour - 1]?.some(r => r.dossard == dossard && !r.horsDelai);

        /* Cas général : DNF après un tour validé */
        if (!aValideTour && aValideTourPrecedent && c.statut === "DNF") {
          liste.push({ dossard, timestamp: null, dnf: true });
        }

        /* Cas spécial : Tour 1 → afficher les DNF même sans tour précédent */
        if (tour === 1 && c.statut === "DNF" && !aValideTour) {
          liste.push({ dossard, timestamp: null, dnf: true });
        }
      });

      /* 🟨 CALCUL DU RATIO */
      let total = 0;
      const validesPrecedent = new Set();
      const validesActuel = new Set();

      if (tour > 1) {
        (tours[tour - 1] || []).forEach(r => {
          if (!r.horsDelai) validesPrecedent.add(r.dossard);
        });
        total = validesPrecedent.size;
      } else {
        Object.keys(coureursMap).forEach(dossard => {
          const c = coureursMap[dossard];
          if (c.statut !== "ELIMINE") total++;
        });
      }

      (tours[tour] || []).forEach(r => {
        if (!r.horsDelai) validesActuel.add(r.dossard);
      });

      const arrives = validesActuel.size;

      let html = `<h2>Tour ${tour}</h2>`;
      html += `<h3 style="color:yellow;">Arrivés : ${arrives} / ${total}</h3>`;
      html += `<div class="grid">`;

      let rank = 1;

      liste.sort((a,b)=>{
        if (a.timestamp && b.timestamp) return a.timestamp.toDate() - b.timestamp.toDate();
        if (a.timestamp) return -1;
        if (b.timestamp) return 1;
        return 0;
      });

      liste.forEach(r => {
        const c = coureursMap[r.dossard] || {};

        let temps = "--:--:--";
        let rouge = false;

        if (r.timestamp) {
          const date = r.timestamp.toDate();
          temps = formatTemps(date - depart);
          rouge = r.horsDelai ? true : false;
        } else if (r.dnf) {
          rouge = true;
          temps = "DNF";
        }

        const classe =
          rouge ? "runner red" :
          (c.categorie === "F" ? "runner femme" : "runner");

        html += `
          <div class="${classe}">
            <div><b>#${rank++}</b></div>
            <div>Dossard : ${r.dossard}</div>
            <div>${c.nom || ""} ${c.prenom || ""}</div>
            <div>${temps}</div>
          </div>
        `;
      });

      html += `</div>`;
      div.innerHTML = html;
    };

    /* 🟦 CLASSEMENT GÉNÉRAL */
    window.afficherGeneral = function() {
      setOngletActif("general");

      let html = `<h2>Classement général</h2>`;
      html += `<div class="grid">`;

      const classement = [];

      Object.keys(tousLesResultats).forEach(dossard => {
        const scans = tousLesResultats[dossard];
        scans.sort((a,b)=>a.timestamp.toDate()-b.timestamp.toDate());
        const dernier = scans[scans.length - 1];
        const date = dernier.timestamp.toDate();
        const tempsMs = date - depart;
        const c = coureursMap[dossard] || {};

        classement.push({
          dossard,
          nom: c.nom || "",
          prenom: c.prenom || "",
          tour: dernier.tour,
          tempsMs,
          temps: formatTemps(tempsMs),
          rouge: (dernier.horsDelai || c.statut === "DNF" || c.statut === "ELIMINE"),
          categorie: c.categorie
        });
      });

      Object.keys(coureursMap).forEach(dossard => {
        if (!tousLesResultats[dossard]) {
          const c = coureursMap[dossard];
          classement.push({
            dossard,
            nom: c.nom || "",
            prenom: c.prenom || "",
            tour: 0,
            tempsMs: Infinity,
            temps: "--:--:--",
            rouge: (c.statut === "DNF" || c.statut === "ELIMINE"),
            categorie: c.categorie
          });
        }
      });

      classement.sort((a,b)=>{
        if (b.tour !== a.tour) return b.tour - a.tour;
        return a.tempsMs - b.tempsMs;
      });

      let rank = 1;

      classement.forEach(r => {
        const classe =
          r.rouge ? "runner red" :
          (r.categorie === "F" ? "runner femme" : "runner");

        html += `
          <div class="${classe}">
            <div><b>#${rank++}</b></div>
            <div>Dossard : ${r.dossard}</div>
            <div>${r.nom} ${r.prenom}</div>
            <div>Tour : ${r.tour}</div>
            <div>${r.temps}</div>
          </div>
        `;
      });

      html += `</div>`;
      div.innerHTML = html;
    };

    /* 🔥 LISTENERS TEMPS RÉEL */
    onSnapshot(collection(db, "coureurs"), snap => {
      coureursMap = {};
      snap.forEach(doc => {
        const c = doc.data();
        coureursMap[c.dossard] = c;
      });

      if (ongletActif === "general") afficherGeneral();
      else afficherTour(Number(ongletActif));
    });

    onSnapshot(query(collection(db, "resultats"), orderBy("timestamp", "asc")), snap => {
      tours = {};
      tousLesResultats = {};

      snap.forEach(doc => {
        const r = doc.data();
        if (!r.tour) return;

        if (!tours[r.tour]) tours[r.tour] = [];
        tours[r.tour].push(r);

        if (!tousLesResultats[r.dossard]) tousLesResultats[r.dossard] = [];
        tousLesResultats[r.dossard].push(r);
      });

      construireOnglets();

      if (ongletActif === "general") afficherGeneral();
      else afficherTour(Number(ongletActif));
    });

  </script>
</body>
</html>
