<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<title>Résultats</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
text-align:center;
}

.columns{
display:grid;
gap:10px;
width:98%;
margin:auto;
}

.cols-1{grid-template-columns:repeat(1,1fr);}
.cols-2{grid-template-columns:repeat(2,1fr);}
.cols-3{grid-template-columns:repeat(3,1fr);}
.cols-4{grid-template-columns:repeat(4,1fr);}

table{
width:100%;
border-collapse:collapse;
font-size:13px;
}

th,td{
border:1px solid #333;
padding:3px;
}

th{
background:#111;
}

.red{
color:red;
font-weight:bold;
}

.femme{
color:#ff66cc;
font-weight:bold;
}

.fade{
animation:fade 0.4s;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

button{
margin:4px;
padding:8px 12px;
font-size:14px;
}

</style>

</head>

<body>

<h1>📊 Résultats</h1>

<a href="index.html" style="color:gray">⬅ Retour</a>

<div id="onglets" style="margin:20px"></div>

<div id="contenu"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";

import {
getFirestore,
collection,
query,
orderBy,
onSnapshot,
doc
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

import { firebaseConfig } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const div = document.getElementById("contenu");

let coureursMap = {};
let tours = {};
let tousLesResultats = {};

let depart = null;
let limites = {}; // limites Firestore
let departTours = {}; // départ théorique de chaque tour

let ongletActif = "general";

/* 🔥 Charger le départ Firestore */
onSnapshot(doc(db, "course", "depart"), snap => {
  if (snap.exists()) {
    depart = snap.data().timestamp.toDate().getTime();
    recalculerDepartTours();
    rafraichir();
  }
});

/* 🔥 Charger les limites Firestore */
onSnapshot(doc(db, "course", "limitesTours"), snap => {
  if (snap.exists()) {
    limites = snap.data();
    recalculerDepartTours();
    rafraichir();
  }
});

/* 🔥 Calcul des départs théoriques */
function recalculerDepartTours() {
  if (!depart || !limites) return;

  departTours = {};
  let cumul = 0;

  for (let i = 1; i <= 10; i++) {
    departTours[i] = depart + cumul * 60000;
    cumul += limites["t" + i] || 0;
  }
}

/* Formatage */
function formatTemps(ms){
  if(!ms || ms<0) return "--:--:--";

  const s=Math.floor(ms/1000);
  const h=String(Math.floor(s/3600)).padStart(2,"0");
  const m=String(Math.floor((s%3600)/60)).padStart(2,"0");
  const sec=String(s%60).padStart(2,"0");

  return `${h}:${m}:${sec}`;
}

/* Temps par tour */
function calculTempsTour(dossard,tour){

  if (!departTours[tour]) return null;

  const scans=tousLesResultats[dossard];
  if(!scans) return null;

  const actuel=scans.find(r=>r.tour===tour);
  if(!actuel) return null;

  return actuel.timestamp - departTours[tour];
}

/* Construire onglets */
function construireOnglets(){
  let html=`<button onclick="afficherGeneral()">Général</button>`;

  Object.keys(tours)
    .map(Number)
    .sort((a,b)=>a-b)
    .forEach(t=>{
      html+=`<button onclick="afficherTour(${t})">Tour ${t}</button>`;
    });

  document.getElementById("onglets").innerHTML=html;
}

/* Affichage d’un tour */
window.afficherTour=function(tour){

  ongletActif=tour;

  let liste=[...(tours[tour]||[])];

  /* RATIO ARRIVÉS */
  let total=0;
  let arrives=0;

  if(tour===1){
    total=Object.values(coureursMap)
      .filter(c=>c.dossard && Number(c.dossard)>0)
      .length;
  } else {
    total=(tours[tour-1]||[])
      .filter(r=>!r.horsDelai)
      .length;
  }

  arrives=(tours[tour]||[])
    .filter(r=>!r.horsDelai)
    .length;

  let elimines=total-arrives;

  let html=`
  <h2>Tour ${tour}</h2>
  <h3 style="color:yellow">Arrivés : ${arrives} / ${total}</h3>
  <h4 style="color:#ff4444">Éliminés : ${elimines}</h4>
  `;

  const nb=liste.length;

  let cols=4;
  if(nb<20) cols=1;
  else if(nb<50) cols=2;
  else if(nb<90) cols=3;

  html+=`<div class="columns cols-${cols}">`;

  const chunk=Math.ceil(nb/cols);
  let colonnes=[];

  for(let i=0;i<cols;i++){
    colonnes.push(liste.slice(i*chunk,(i+1)*chunk));
  }

  let rank=1;

  colonnes.forEach(col=>{
    html+=`
    <table>
    <tr>
    <th>#</th>
    <th>Dossard</th>
    <th>Nom</th>
    <th>Temps</th>
    </tr>`;

    col.forEach(r=>{
      const c=coureursMap[r.dossard]||{};

      let tempsTour=calculTempsTour(r.dossard,tour);

      const classe=
        r.horsDelai ? "red fade":
        (c.categorie==="F"?"femme fade":"fade");

      html+=`
      <tr class="${classe}">
      <td>${rank++}</td>
      <td>${r.dossard}</td>
      <td>${c.nom||""} ${c.prenom||""}</td>
      <td>${formatTemps(tempsTour)}</td>
      </tr>
      `;
    });

    html+="</table>";
  });

  html+="</div>";

  div.innerHTML=html;
};

/* Classement général */
window.afficherGeneral=function(){

  ongletActif="general";

  let classement=[];

  Object.keys(tousLesResultats).forEach(dossard=>{

    const scans=tousLesResultats[dossard];
    scans.sort((a,b)=>a.tour - b.tour);

    let total=0;

    scans.forEach(r=>{
      const t = calculTempsTour(dossard, r.tour);
      if (t !== null) total += t;
    });

    const c=coureursMap[dossard]||{};

    classement.push({
      dossard,
      nom:c.nom||"",
      prenom:c.prenom||"",
      tour:scans.length,
      temps:total,
      rouge:c.statut==="DNF" || c.statut==="ELIMINE",
      categorie:c.categorie
    });

  });

  classement.sort((a,b)=>{
    if(b.tour!==a.tour) return b.tour-a.tour;
    return a.temps-b.temps;
  });

  let html=`<h2>Classement général</h2>`;

  html+=`
  <table style="margin:auto">
  <tr>
  <th>#</th>
  <th>Dossard</th>
  <th>Nom</th>
  <th>Tour</th>
  <th>Total</th>
  </tr>`;

  let rank=1;

  classement.forEach(r=>{
    const classe=
      r.rouge ? "red fade":
      (r.categorie==="F"?"femme fade":"fade");

    html+=`
    <tr class="${classe}">
    <td>${rank++}</td>
    <td>${r.dossard}</td>
    <td>${r.nom} ${r.prenom}</td>
    <td>${r.tour}</td>
    <td>${formatTemps(r.temps)}</td>
    </tr>
    `;
  });

  html+="</table>";

  div.innerHTML=html;
};

/* LISTENERS FIRESTORE */
onSnapshot(collection(db,"coureurs"),snap=>{
  coureursMap={};

  snap.forEach(doc=>{
    const c=doc.data();
    if (!c.dossard || Number(c.dossard)<=0) return; // ignore depart
    coureursMap[c.dossard]=c;
  });

  rafraichir();
});

onSnapshot(query(collection(db,"resultats"),orderBy("timestamp","asc")),snap=>{

  tours={};
  tousLesResultats={};

  snap.forEach(doc=>{
    const r=doc.data();
    if(!r.tour) return;

    const ts=r.timestamp?.toDate().getTime() ?? null;

    if(!tours[r.tour]) tours[r.tour]=[];
    tours[r.tour].push({...r, timestamp:ts});

    if(!tousLesResultats[r.dossard]) tousLesResultats[r.dossard]=[];
    tousLesResultats[r.dossard].push({...r, timestamp:ts});
  });

  rafraichir();
});

function rafraichir(){
  if(ongletActif==="general") afficherGeneral();
  else afficherTour(Number(ongletActif));
}

</script>

</body>
</html>
