<!DOCTYPE html>

<title>APOLLO RUN</title>

<style>

body{
background:#000;
color:#fff;
font-family:Arial,sans-serif;
text-align:center;
margin:0;
padding:0;
}

/* TITRE */

h1{
font-size:60px;
margin-top:40px;
letter-spacing:4px;
color:#ffcc00;
text-shadow:0 0 15px #ffcc00;
}

/* MENU */

.menu{
margin-top:50px;
display:flex;
flex-direction:column;
gap:20px;
width:60%;
margin-left:auto;
margin-right:auto;
}

.btn{
display:block;
padding:20px;
font-size:26px;
font-weight:bold;
text-decoration:none;
color:white;
border-radius:10px;
background:linear-gradient(90deg,#444,#222);
border:2px solid #666;
transition:0.2s;
}

.btn:hover{
background:linear-gradient(90deg,#666,#333);
transform:scale(1.03);
border-color:#ffcc00;
}

/* SPEAKER / LIVE */

.live-block{
margin-top:60px;
padding:40px 0;
background:#080808;
border-top:2px solid #222;
border-bottom:2px solid #222;
}

.live-title{
font-size:38px;
margin-bottom:25px;
color:#00ccff;
text-shadow:0 0 10px #00ccff;
}

.live-btn{
display:inline-block;
padding:18px 35px;
font-size:24px;
font-weight:bold;
text-decoration:none;
color:white;
background:#0077aa;
border-radius:10px;
transition:0.2s;
}

.live-btn:hover{
background:#0099dd;
transform:scale(1.05);
}

/* SCAN */

.scan-block{
margin-top:80px;
padding:50px 0;
background:#111;
border-top:2px solid #333;
}

.scan-title{
font-size:40px;
margin-bottom:30px;
color:#00ff99;
text-shadow:0 0 10px #00ff99;
}

.scan-btn{
display:inline-block;
padding:22px 45px;
font-size:30px;
font-weight:bold;
text-decoration:none;
color:black;
background:#00ff99;
border-radius:10px;
transition:0.2s;
}

.scan-btn:hover{
background:#00cc77;
transform:scale(1.07);
}

footer{
margin-top:60px;
color:#666;
font-size:14px;
}

</style>
</head>
