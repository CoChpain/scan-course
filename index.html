<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>SCAN COURSE</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body style="background:#000;color:white;font-family:Arial;text-align:center;">

  <h1>🏁 SCAN </h1>

  <div id="reader" style="width:320px;margin:auto;"></div>

  <div id="feedback" style="font-size:26px;font-weight:bold;margin-top:20px;"></div>

  <script>
  const apiURL = "https://script.google.com/macros/s/AKfycbyHoS0v2_28p4rj8Rp1Plc8gFQ-NpuDur19igBc3OVogGUlKzmz7f6bb-hMi6XaS2p4Sw/exec";

  let scanner;
  let isProcessing = false;

  const beepOk = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
  const beepError = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");

  function showMessage(msg, color="white"){
      const fb = document.getElementById("feedback");
      fb.style.color = color;
      fb.innerHTML = msg;
  }

  function onScanSuccess(decodedText){
      if(isProcessing) return;

      isProcessing = true;
      scanner.pause(true);

      const dossard = decodedText.trim().replace(/\D/g,'');

      fetch(apiURL,{
          method:"POST",
          headers:{
              "Content-Type":"application/json"
          },
          body: JSON.stringify({ dossard:dossard })
      })
      .then(response => response.json())
      .then(data => {
          if(data.status === "error"){
              beepError.play();
              showMessage("❌ " + data.message, "red");
          }
          else if(data.statut === "ELIMINE"){
              beepError.play();
              showMessage("⛔ COUREUR ÉLIMINÉ", "red");
          }
          else{
              beepOk.play();
              showMessage(
                  "✅ Tour " + data.tour +
                  "<br>⏱ " + data.temps + " sec" +
                  "<br>🏃 Restants : " + data.restants,
                  "lime"
              );
          }
      })
      .catch(err=>{
          console.error(err);
          beepError.play();
          showMessage("❌ Erreur connexion serveur","red");
      })
      .finally(()=>{
          setTimeout(()=>{
              scanner.resume();
              isProcessing = false;
          },1200);
      });
  }

  scanner = new Html5QrcodeScanner("reader",{
      fps:10,
      qrbox:220
  });

  scanner.render(onScanSuccess);
  </script>

</body>
</html>
