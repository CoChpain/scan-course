<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>La Team RunTravel</title>

<style>
/* --- Thème APOLLO RUN --- */
body {
  background: #000;
  color: #fff;
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 0;
  text-align: center;
}

h1 {
  margin-top: 40px;
  font-size: 42px;
  letter-spacing: 2px;
  color: #ff66cc;
  text-shadow: 0 0 10px #ff66cc;
}

/* --- Grille responsive --- */
.team-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 25px;
  justify-items: center;
  margin: 40px 20px;
}

@media (min-width: 700px) {
  .team-container { grid-template-columns: repeat(3, 1fr); }
}
@media (min-width: 1000px) {
  .team-container { grid-template-columns: repeat(4, 1fr); }
}
@media (min-width: 1300px) {
  .team-container { grid-template-columns: repeat(6, 1fr); }
}

/* --- Carte coureur --- */
.player-wrapper {
  width: 180px;
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  transition: transform 0.3s ease;
  opacity: 0;
  transform: translateY(10px);
  animation: fadeSlide 0.5s ease forwards;
}

.player-wrapper:hover {
  transform: translateY(-8px);
}

.player-card {
  position: relative;
  width: 100%;
  aspect-ratio: 2/3;
  background: #111;
  border-radius: 15px;
  overflow: hidden;
  box-shadow: 0 8px 20px rgba(255, 255, 255, 0.1);
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
}

/* Logo en fond */
.logo-bg {
  position: absolute;
  top: 5px;
  left: 10px;
  opacity: 0.15;
  z-index: 0;
}

.logo-bg img {
  width: 50%;
  height: auto;
}

/* Image coureur */
.player-image {
  position: relative;
  z-index: 2;
  width: 100%;
  max-height: 75%;
  object-fit: contain;
  transition: transform 0.3s ease;
}

.player-wrapper:hover .player-image {
  transform: scale(1.08);
}

/* Nom */
.player-name {
  position: absolute;
  bottom: 25px;
  width: 100%;
  text-align: center;
  font-size: clamp(10px, 1.9vw, 16px);
  font-weight: bold;
  background: rgba(0, 0, 0, 0.7);
  padding: 6px 0;
  z-index: 3;
  color: #fff;
}

/* Animation d’apparition */
@keyframes fadeSlide {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<h1>🔥 LA TEAM RUNTRAVEL</h1>

<div class="team-container" id="team-container"></div>

<!-- PapaParse -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<script>
(function () {

  const container = document.querySelector('#team-container');

  const csvUrl =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vSnHB4b9ZyE_WryKMhYaOgl6TNZVV-T_lKXfZbHb4RcrsxG0efGEmTtUc_P-lcutCOhzT-ik2Sgx7PE/pub?output=csv";

  let membres = [];

  /* Lecture Google Sheet */
  fetch(csvUrl)
    .then(res => res.text())
    .then(csvText => {
      const parsed = Papa.parse(csvText, { header: false, skipEmptyLines: true });
      const data = parsed.data;

      for (let i = 1; i < data.length; i++) {
        const ligne = data[i];
        const nom = (ligne[0] || "").trim();
        if (!nom) continue;

        membres.push({ nom });
      }

      afficherMembres();
    });

  /* Affichage simple : photo + nom */
  function afficherMembres() {
    container.innerHTML = "";

    membres.forEach(m => {
      const wrapper = document.createElement("div");
      wrapper.className = "player-wrapper";

      const card = document.createElement("div");
      card.className = "player-card";

      const logo = document.createElement("div");
      logo.className = "logo-bg";
      logo.innerHTML =
        `<img src="https://s3-eu-west-2.amazonaws.com/superhalfs-production/sub_bucket/uploads/travel/b042c5fff425664439990b2a329e5fab0646/standard.png">`;
      card.appendChild(logo);

      const img = document.createElement("img");
      img.className = "player-image";
      img.src =
        "https://admin.sportsregions.fr/media/uploaded/sites/20376/kcupload/images/1000047083%20(4).png";
      img.alt = m.nom;
      card.appendChild(img);

      const name = document.createElement("div");
      name.className = "player-name";
      name.textContent = m.nom;
      card.appendChild(name);

      wrapper.appendChild(card);
      container.appendChild(wrapper);
    });
  }

})();
</script>

</body>
</html>
