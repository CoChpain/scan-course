<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ADMIN – APOLLO RUN</title>

<style>
body{
  background:#000;
  color:white;
  font-family:Arial;
  text-align:center;
}
input,select{
  padding:8px;
  font-size:16px;
  margin:5px;
}
button{
  padding:8px 15px;
  font-size:16px;
  margin:5px;
}
table{
  width:90%;
  margin:auto;
  border-collapse:collapse;
  margin-top:20px;
}
th,td{
  border:1px solid #444;
  padding:5px;
}
th{
  background:#111;
}
.red{color:red;font-weight:bold;}

#lock{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;

</head>

<body>

<!-- 🔐 VERROUILLAGE -->
<div id="lock">
  <h2>🔒 Accès administrateur</h2>
  <input id="pwd" type="password" placeholder="Mot de passe" style="padding:10px;font-size:20px;">
  <button onclick="checkPwd()" style="padding:10px 20px;margin-top:10px;font-size:20px;">Entrer</button>
  <div id="err" style="color:red;margin-top:10px;"></div>
</div>

<script>
function checkPwd(){
  const good = "3sRunTravel2026";
  const val = document.getElementById("pwd").value;
  if(val === good){
    document.getElementById("lock").style.display = "none";
  } else {
    document.getElementById("err").innerHTML = "Mot de passe incorrect";
  }
}
</script>

<h1>🛠️ ADMIN – Gestion de la course</h1>
<a href="index.html" style="color:gray">⬅ Retour</a>

<hr>

<!-- 🔍 RECHERCHE COUREUR -->
<h2>🔍 Rechercher un coureur</h2>

<input id="search-dossard" type="text" placeholder="Dossard">
<button onclick="searchRunner()">Rechercher</button>

<div id="runner-info"></div>
<div id="scan-list"></div>

<hr>

<!-- ➕ AJOUT / MODIFICATION SCAN -->
<h2>➕ Ajouter un scan manuellement</h2>

<input id="add-dossard" type="text" placeholder="Dossard">
<input id="add-tour" type="number" placeholder="Tour">
<input id="add-time" type="text" placeholder="Temps (HH:MM:SS)">
<button onclick="addScan()">Ajouter</button>

<hr>

<!-- ⚙️ MODIFIER STATUT -->
<h2>⚙️ Modifier statut coureur</h2>

<input id="status-dossard" type="text" placeholder="Dossard">
<select id="status-select">
  <option value="OK">OK</option>
  <option value="DNS">DNS</option>
  <option value="DNF">DNF</option>
  <option value="ELIMINE">Éliminé</option>
</select>
<button onclick="updateStatus()">Mettre à jour</button>

<hr>

<!-- ➕ AJOUT / MODIFICATION COUREUR -->
<h2>➕ Ajouter / Modifier un coureur</h2>

<input id="c-dossard" type="text" placeholder="Dossard">
<input id="c-nom" type="text" placeholder="Nom">
<input id="c-prenom" type="text" placeholder="Prénom">

<select id="c-sexe">
  <option value="H">Homme</option>
  <option value="F">Femme</option>
</select>

<button onclick="saveRunner()">Enregistrer</button>

<div id="runner-save-status" style="margin-top:10px;color:yellow;"></div>

<!-- 📋 TABLEAU DES COUREURS -->
<hr>
<h2>📋 Liste complète des coureurs</h2>
<div id="table-coureurs"></div>

<!-- 📝 SCANS DU COUREUR EN ÉDITION -->
<div id="edit-runner-scans"></div>

<hr>
<script type="module">

  window.startChrono = async function(){

  if (startMs) {
    document.getElementById("chrono-status").innerHTML =
      "⚠️ Le chrono est déjà lancé.";
    return;
  }

  const confirmation = confirm(
    "⚠️ Es-tu sûr de vouloir lancer le chrono ?\n" +
    "Cette action ne peut être faite qu'une seule fois."
  );

  if (!confirmation) return;

  const now = Date.now();

  await updateDoc(doc(db,"course","depart"), {
    startMs: now
  });

  startMs = now;

  document.getElementById("chrono-status").innerHTML =
    "Chrono lancé à 00:00:00";

  const btn = document.getElementById("btn-start");
  btn.disabled = true;
  btn.style.opacity = "0.5";
  btn.style.cursor = "not-allowed";
};
window.resetChrono = async function(){

  if (!startMs) {
    document.getElementById("chrono-status").innerHTML =
      "ℹ️ Aucun chrono n'est lancé.";
    return;
  }

  const c1 = confirm("⚠️ Réinitialiser le chrono ?");
  if (!c1) return;

  const c2 = confirm("⚠️ Tous les chronos repartiront de zéro.");
  if (!c2) return;

  const c3 = confirm("⚠️ Dernière confirmation.");
  if (!c3) return;

  await updateDoc(doc(db,"course","depart"), {
    startMs: null
  });

  startMs = null;

  document.getElementById("chrono-status").innerHTML =
    "Chrono réinitialisé. Prêt pour un nouveau départ.";

  const btn = document.getElementById("btn-start");
  btn.disabled = false;
  btn.style.opacity = "1";
  btn.style.cursor = "pointer";
};
window.resetCoureurs = async function(){

  const c1 = confirm("⚠️ Supprimer TOUS les coureurs ?");
  if (!c1) return;

  const c2 = confirm("⚠️ Cette action est irréversible.");
  if (!c2) return;

  const c3 = confirm("⚠️ Dernière confirmation avant suppression.");
  if (!c3) return;

  const snap = await getDocs(collection(db,"coureurs"));

  let count = 0;

  for (const docu of snap.docs) {
    await deleteDoc(doc(db,"coureurs",docu.id));
    count++;
  }

  document.getElementById("reset-coureurs-status").innerHTML =
    "🗑️ " + count + " coureurs supprimés.";
};


import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import {
  getFirestore, collection, query, where, getDocs,
  doc, updateDoc, deleteDoc, addDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

import { firebaseConfig } from "./firebase-config.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let startMs = null;

/* -------------------------------------------
   🔥 CHARGER LE CHRONO
--------------------------------------------*/
onSnapshot(doc(db,"course","depart"), snap=>{
  if(snap.exists()){
    startMs = snap.data().startMs;

    const btnStart = document.getElementById("btn-start");

    if (startMs) {
      btnStart.disabled = true;
      btnStart.style.opacity = "0.5";
      btnStart.style.cursor = "not-allowed";

      document.getElementById("chrono-status").innerHTML =
        "Chrono déjà lancé";
    } else {
      btnStart.disabled = false;
      btnStart.style.opacity = "1";
      btnStart.style.cursor = "pointer";

      document.getElementById("chrono-status").innerHTML =
        "Chrono en attente de lancement";
    }
  }
});

/* -------------------------------------------
   🚀 LANCER LE CHRONO
--------------------------------------------*/
window.startChrono = async function(){

  if (startMs) {
    document.getElementById("chrono-status").innerHTML =
      "⚠️ Le chrono est déjà lancé.";
    return;
  }

  const confirmation = confirm(
    "⚠️ Es-tu sûr de vouloir lancer le chrono ?\n" +
    "Cette action ne peut être faite qu'une seule fois."
  );

  if (!confirmation) return;

  const now = Date.now();

  await updateDoc(doc(db,"course","depart"), {
    startMs: now
  });

  startMs = now;

  document.getElementById("chrono-status").innerHTML =
    "Chrono lancé à 00:00:00";

  const btn = document.getElementById("btn-start");
  btn.disabled = true;
  btn.style.opacity = "0.5";
  btn.style.cursor = "not-allowed";
};

/* -------------------------------------------
   🔁 RÉINITIALISER LE CHRONO
--------------------------------------------*/
window.resetChrono = async function(){

  if (!startMs) {
    document.getElementById("chrono-status").innerHTML =
      "ℹ️ Aucun chrono n'est lancé.";
    return;
  }

  const c1 = confirm("⚠️ Réinitialiser le chrono ?");
  if (!c1) return;

  const c2 = confirm("⚠️ Tous les chronos repartiront de zéro.");
  if (!c2) return;

  const c3 = confirm("⚠️ Dernière confirmation.");
  if (!c3) return;

  await updateDoc(doc(db,"course","depart"), {
    startMs: null
  });

  startMs = null;

  document.getElementById("chrono-status").innerHTML =
    "Chrono réinitialisé. Prêt pour un nouveau départ.";

  const btn = document.getElementById("btn-start");
  btn.disabled = false;
  btn.style.opacity = "1";
  btn.style.cursor = "pointer";
};

/* -------------------------------------------
   🔍 RECHERCHE COUREUR
--------------------------------------------*/
window.searchRunner = async function(){

  const dossard = document.getElementById("search-dossard").value.trim();
  if(!dossard) return;

  const q = query(collection(db,"coureurs"), where("dossard","==",dossard));
  const snap = await getDocs(q);

  if(snap.empty){
    document.getElementById("runner-info").innerHTML = "<p class='red'>Coureur introuvable</p>";
    return;
  }

  const data = snap.docs[0].data();

  document.getElementById("runner-info").innerHTML = `
    <h3>${data.nom} ${data.prenom}</h3>
    <p>Dossard : ${data.dossard}</p>
    <p>Statut : ${data.statut}</p>
  `;

  loadScans(dossard);
};

/* -------------------------------------------
   📄 LISTE DES SCANS
--------------------------------------------*/
async function loadScans(dossard){

  const q = query(collection(db,"resultats"), where("dossard","==",dossard));
  const snap = await getDocs(q);

  let html = `
    <h3>Scans</h3>
    <table>
      <tr>
        <th>Tour</th>
        <th>Temps</th>
        <th>Hors délai</th>
        <th>Dossard</th>
        <th>Actions</th>
      </tr>
  `;

  snap.forEach(docu => {
    const r = docu.data();
    const id = docu.id;

    let temps = "--:--:--";
    if(r.timestamp && startMs){
      const diff = r.timestamp.toDate().getTime() - startMs;
      temps = format(diff);
    }

    html += `
      <tr>
        <td>${r.tour}</td>
        <td>${temps}</td>
        <td>${r.horsDelai ? "Oui" : "Non"}</td>
        <td>${r.dossard}</td>
        <td>
          <button onclick="editScan('${id}', ${r.tour}, '${r.dossard}')">Modifier</button>
          <button onclick="deleteScan('${id}')">Supprimer</button>
        </td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("scan-list").innerHTML = html;
}

/* Format HH:MM:SS */
function format(ms){
  const s = Math.floor(ms/1000);
  const h = String(Math.floor(s/3600)).padStart(2,"0");
  const m = String(Math.floor((s%3600)/60)).padStart(2,"0");
  const sec = String(s%60).padStart(2,"0");
  return `${h}:${m}:${sec}`;
}

/* -------------------------------------------
   ✏️ MODIFIER UN SCAN
--------------------------------------------*/
window.editScan = async function(id, tour, oldDossard){

  const newTime = prompt("Temps écoulé (HH:MM:SS) ?");
  if(!newTime) return;

  const [h,m,s] = newTime.split(":").map(Number);
  const ms = (h*3600 + m*60 + s) * 1000;

  const timestamp = new Date(startMs + ms);

  const newDossard = prompt("Modifier le dossard ? (laisser vide pour garder " + oldDossard + ")");
  const dossardFinal = newDossard.trim() !== "" ? newDossard.trim() : oldDossard;

  await updateDoc(doc(db,"resultats",id), {
    timestamp: timestamp,
    dossard: dossardFinal
  });

  alert("Scan modifié !");
  searchRunner();
};

/* -------------------------------------------
   ✏️ MODIFIER UN SCAN DEPUIS LA FICHE COUREUR
--------------------------------------------*/
window.editRunnerScan = async function(id, tour, dossard){

  const newTime = prompt("Nouveau temps pour le tour " + tour + " (HH:MM:SS) :");
  if(!newTime) return;

  const [h,m,s] = newTime.split(":").map(Number);
  const ms = (h*3600 + m*60 + s) * 1000;

  const timestamp = new Date(startMs + ms);

  await updateDoc(doc(db,"resultats",id), {
    timestamp: timestamp
  });

  alert("Temps mis à jour !");
  editRunner(dossard); // recharge les scans
};

/* -------------------------------------------
   ❌ SUPPRIMER UN SCAN
--------------------------------------------*/
window.deleteScan = async function(id){
  await deleteDoc(doc(db,"resultats",id));
  alert("Scan supprimé !");
  searchRunner();
};

/* -------------------------------------------
   ➕ AJOUTER UN SCAN
--------------------------------------------*/
window.addScan = async function(){

  const dossard = document.getElementById("add-dossard").value.trim();
  const tour = Number(document.getElementById("add-tour").value);
  const time = document.getElementById("add-time").value;

  if(!dossard || !tour || !time) return alert("Champs incomplets");

  const [h,m,s] = time.split(":").map(Number);
  const ms = (h*3600 + m*60 + s) * 1000;

  const timestamp = new Date(startMs + ms);

  await addDoc(collection(db,"resultats"), {
    dossard,
    tour,
    timestamp,
    horsDelai: false
  });

  alert("Scan ajouté !");
  searchRunner();
};

/* -------------------------------------------
   🔄 MODIFIER STATUT
--------------------------------------------*/
window.updateStatus = async function(){

  const dossard = document.getElementById("status-dossard").value.trim();
  const statut = document.getElementById("status-select").value;

  const q = query(collection(db,"coureurs"), where("dossard","==",dossard));
  const snap = await getDocs(q);

  if(snap.empty) return alert("Coureur introuvable");

  const id = snap.docs[0].id;

  await updateDoc(doc(db,"coureurs",id), {
    statut
  });

  alert("Statut mis à jour !");
  searchRunner();
};

/* -------------------------------------------
   ➕ AJOUTER / MODIFIER UN COUREUR
--------------------------------------------*/
window.saveRunner = async function(){

  const dossard = document.getElementById("c-dossard").value.trim();
  const nom = document.getElementById("c-nom").value.trim();
  const prenom = document.getElementById("c-prenom").value.trim();
  const sexe = document.getElementById("c-sexe").value;

  if(!dossard || !nom || !prenom){
    document.getElementById("runner-save-status").innerHTML =
      "⚠️ Merci de remplir tous les champs.";
    return;
  }

  const q = query(collection(db,"coureurs"), where("dossard","==",dossard));
  const snap = await getDocs(q);

  if(snap.empty){
    await addDoc(collection(db,"coureurs"), {
      dossard,
      nom,
      prenom,
      categorie: sexe,
      statut: "OK"
    });

    document.getElementById("runner-save-status").innerHTML =
      "✅ Coureur ajouté avec succès.";
  } 
  else {
    const id = snap.docs[0].id;

    await updateDoc(doc(db,"coureurs",id), {
      nom,
      prenom,
      categorie: sexe
    });

    document.getElementById("runner-save-status").innerHTML =
      "✏️ Coureur mis à jour.";
  }

  document.getElementById("c-dossard").value = "";
  document.getElementById("c-nom").value = "";
  document.getElementById("c-prenom").value = "";
};

/* -------------------------------------------
   📋 TABLEAU COMPLET DES COUREURS
--------------------------------------------*/
onSnapshot(collection(db, "coureurs"), snap => {

  let liste = [];

  snap.forEach(docu => {
    const c = docu.data();
    if (!c.dossard) return;
    liste.push(c);
  });

  liste.sort((a, b) => Number(a.dossard) - Number(b.dossard));

  let html = `
    <table>
      <tr>
        <th>Dossard</th>
        <th>Nom</th>
        <th>Prénom</th>
        <th>Sexe</th>
        <th>Statut</th>
        <th>Action</th>
      </tr>
  `;

  liste.forEach(c => {
    html += `
      <tr>
        <td>${c.dossard}</td>
        <td>${c.nom}</td>
        <td>${c.prenom}</td>
        <td>${c.categorie}</td>
        <td>${c.statut}</td>
        <td>
          <button onclick="editRunner('${c.dossard}', '${c.nom}', '${c.prenom}', '${c.categorie}')">
            Modifier
          </button>
        </td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("table-coureurs").innerHTML = html;
});

/* -------------------------------------------
   ✏️ REMPLIR LE FORMULAIRE + AFFICHER SCANS
--------------------------------------------*/
window.editRunner = async function(dossard, nom, prenom, sexe){

  document.getElementById("c-dossard").value = dossard;
  document.getElementById("c-nom").value = nom;
  document.getElementById("c-prenom").value = prenom;
  document.getElementById("c-sexe").value = sexe;

  document.getElementById("runner-save-status").innerHTML =
    "✏️ Modification du coureur " + dossard;

  const q = query(collection(db,"resultats"), where("dossard","==",dossard));
  const snap = await getDocs(q);

  let html = `
    <h3>⏱️ Scans du coureur</h3>
    <table>
      <tr>
        <th>Tour</th>
        <th>Temps</th>
        <th>Action</th>
      </tr>
  `;

  snap.forEach(docu => {
    const r = docu.data();
    const id = docu.id;

    let temps = "--:--:--";
    if(r.timestamp && startMs){
      const diff = r.timestamp.toDate().getTime() - startMs;
      temps = format(diff);
    }

    html += `
      <tr>
        <td>${r.tour}</td>
        <td>${temps}</td>
        <td>
          <button onclick="editRunnerScan('${id}', ${r.tour}, '${dossard}')">
            Modifier
          </button>
        </td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("edit-runner-scans").innerHTML = html;
};

<button id="btn-start" onclick="startChrono()" 
        style="padding:12px 25px;font-size:22px;background:#00ff99;color:black;border-radius:8px;">
  🚀 Lancer le chrono
</button>

<button id="btn-reset" onclick="resetChrono()" 
        style="padding:12px 25px;font-size:22px;background:#ff4444;color:white;border-radius:8px;margin-left:10px;">
  🔁 Réinitialiser le chrono
</button>

<div id="chrono-status" style="margin-top:10px;color:yellow;font-size:18px;"></div>

<hr>

<h2>🗑️ Réinitialiser la base coureurs</h2>

<button onclick="resetCoureurs()" 
        style="padding:12px 25px;font-size:22px;background:#ff0000;color:white;border-radius:8px;">
  ⚠️ Supprimer TOUS les coureurs
</button>

<div id="reset-coureurs-status" style="margin-top:10px;color:orange;"></div>

</script>

</body>
</html>
